<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>moding — profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary: #fff;
            --accent: #555;
            --bg-glass: rgba(10, 10, 10, 0.6);
            --border: rgba(255, 255, 255, 0.1);
            --glow: 0 0 20px rgba(255, 255, 255, 0.05);
        }

        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; cursor: crosshair; }
        
        body { 
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; 
            background: #000; color: var(--primary); font-family: 'Inter', sans-serif; overflow: hidden; 
        }

        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 1000; display: flex; 
            align-items: center; justify-content: center; 
            transition: 1.5s cubic-bezier(0.7, 0, 0.3, 1); 
        }
        #overlay.hidden { opacity: 0; visibility: hidden; }
        .enter-hint { font-family: 'JetBrains Mono'; font-size: 11px; letter-spacing: 5px; color: #666; text-transform: uppercase; animation: pulse 2s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }

        
        #main-content { opacity: 0; filter: blur(10px); transform: scale(0.9); transition: 2s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 10; display: flex; justify-content: center; width: 100%; }
        #main-content.active { opacity: 1; filter: blur(0); transform: scale(1); }

        .card { 
            background: var(--bg-glass); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px);
            padding: 40px; border-radius: 24px; 
            border: 1px solid var(--border); 
            text-align: center; width: 350px;
            box-shadow: var(--glow), 0 20px 40px rgba(0,0,0,0.8);
            transition: 0.5s ease;
        }
        .card:hover { border-color: rgba(255,255,255,0.2); box-shadow: 0 0 40px rgba(255,255,255,0.05); }

        .avatar { width: 90px; height: 90px; border-radius: 50%; border: 1px solid var(--border); margin-bottom: 20px; object-fit: cover; box-shadow: 0 0 15px rgba(255,255,255,0.05); }
        
        .username { font-size: 24px; font-weight: 700; font-family: 'JetBrains Mono'; letter-spacing: -0.5px; margin: 0; }
        .bio { font-size: 10px; color: #444; margin: 8px 0 20px; text-transform: uppercase; letter-spacing: 2px; }

        
        .social-links { margin-bottom: 25px; }
        .social-item {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 10px; border-radius: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            text-decoration: none; color: #888;
            font-size: 12px; font-family: 'JetBrains Mono';
            transition: 0.3s;
        }
        .social-item:hover { background: rgba(255,255,255,0.07); color: #fff; border-color: rgba(255,255,255,0.3); box-shadow: 0 0 15px rgba(255,255,255,0.1); }

        
        .player-container {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px;
        }
        .track-info { text-align: left; margin-bottom: 12px; }
        .track-name { font-size: 13px; font-weight: 600; letter-spacing: 0.5px; color: #eee; }
        .artist-name { font-size: 11px; color: #444; margin-top: 2px; }

        .progress-area { width: 100%; height: 3px; background: rgba(255,255,255,0.05); border-radius: 2px; position: relative; margin: 15px 0; cursor: pointer; }
        .progress-bar { height: 100%; background: #fff; border-radius: 2px; width: 0%; position: relative; box-shadow: 0 0 10px #fff; }

        .controls { display: flex; justify-content: center; align-items: center; gap: 30px; }
        .ctrl-btn { font-size: 16px; color: #555; transition: 0.3s; cursor: pointer; }
        .ctrl-btn:hover { color: #fff; transform: scale(1.1); text-shadow: 0 0 10px #fff; }

    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="overlay" onclick="enterSite()">
        <div class="enter-hint">welcome click please</div>
    </div>

    <div id="main-content">
        <audio id="music" loop>
            <source src="Aphex_Twin_-_Xtal_48056933.mp3" type="audio/mpeg">
        </audio>

        <div class="card" id="card">
            <img src="IMG_20260304_151919_630.jpg" class="avatar">
            <h1 class="username">moding</h1>
            <p class="bio">the beginning of a new path</p>

            <div class="social-links">
                <a href="https://t.me/lzxslx" class="social-item" target="_blank">
                    <i class="fab fa-telegram-plane"></i> telegram
                </a>
            </div>

            <div class="player-container">
                <div class="track-info">
                    <div class="track-name">Xtal</div>
                    <div class="artist-name">Aphex Twin</div>
                </div>

                <div class="progress-area" id="progress-area">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>

                <div class="controls">
                    <i class="fas fa-backward ctrl-btn" onclick="restart()"></i>
                    <i class="fas fa-play ctrl-btn" id="playIcon" style="font-size: 22px;"></i>
                    <i class="fas fa-forward ctrl-btn" style="opacity: 0.1;"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('music');
        const playBtn = document.getElementById('playIcon');
        const progressBar = document.getElementById('progress-bar');
        const progressArea = document.getElementById('progress-area');
        const card = document.getElementById('card');

        function enterSite() {
            document.getElementById('overlay').classList.add('hidden');
            document.getElementById('main-content').classList.add('active');
            audio.play();
            updateBtn();
        }

        function updateBtn() {
            playBtn.className = audio.paused ? 'fas fa-play ctrl-btn' : 'fas fa-pause ctrl-btn';
        }

        audio.ontimeupdate = (e) => {
            const { currentTime, duration } = e.srcElement;
            const percent = (currentTime / duration) * 100;
            progressBar.style.width = `${percent}%`;
        };

        progressArea.onclick = (e) => {
            const width = progressArea.clientWidth;
            const clickX = e.offsetX;
            audio.currentTime = (clickX / width) * audio.duration;
        };

        playBtn.onclick = (e) => { 
            e.stopPropagation(); 
            audio.paused ? audio.play() : audio.pause(); 
            updateBtn(); 
        };

        function restart() { audio.currentTime = 0; audio.play(); updateBtn(); }

        
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 40;
            const y = (window.innerHeight / 2 - e.pageY) / 40;
            card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });

        
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5,
                    speedY: Math.random() * 0.5 + 0.1,
                    speedX: (Math.random() - 0.5) * 0.3,
                    opacity: Math.random()
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            particles.forEach(p => {
                ctx.globalAlpha = p.opacity;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                
                p.y += p.speedY;
                p.x += p.speedX;

                if (p.y > canvas.height) {
                    p.y = -5;
                    p.x = Math.random() * canvas.width;
                }
            });
            requestAnimationFrame(draw);
        }

        window.onresize = init;
        init();
        draw();
    </script>
</body>
</html>
